!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹戰紀：幻境背景版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --neon-blue: #60a5fa;
            --neon-pink: #f472b6;
            --neon-purple: #8b5cf6;
        }
        body {
            margin: 0;
            overflow: hidden;
            background-color: #020617;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 60px rgba(139, 92, 246, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            overflow: hidden;
            background: #000;
            width: 1000px;
            height: 600px;
        }
        /* 復古掃描線濾鏡 */
        #game-container::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 50;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }
        canvas {
            display: block;
        }
        .overlay-screen {
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.7);
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .btn {
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
            padding: 14px 45px;
            border-radius: 16px;
            font-size: 20px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            color: white;
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4);
            text-transform: uppercase;
        }
        .btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 35px rgba(236, 72, 153, 0.6);
        }
        .hero-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            width: 145px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            text-align: center;
        }
        .hero-card.selected {
            border-color: var(--neon-pink);
            background: rgba(236, 72, 153, 0.15);
            box-shadow: 0 0 30px rgba(236, 72, 153, 0.3);
            transform: scale(1.08) translateY(-5px);
        }
        .count-btn {
            width: 65px; height: 65px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            font-size: 20px;
            font-weight: 800;
            transition: 0.3s;
        }
        .count-btn.active {
            border-color: var(--neon-blue);
            background: rgba(96, 165, 250, 0.2);
            color: white;
            box-shadow: 0 0 20px rgba(96, 165, 250, 0.4);
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="overlay" class="overlay-screen">
        <div id="step-count" class="flex flex-col items-center">
            <h1 class="text-6xl font-black mb-2 bg-clip-text text-transparent bg-gradient-to-br from-blue-300 via-purple-500 to-pink-500 italic tracking-tighter">NEON STRIKE</h1>
            <p class="text-blue-400/60 mb-12 tracking-[0.5em] font-bold text-xs uppercase">Quantum Arena v2.5</p>
            <div class="flex gap-6 mb-12">
                <button class="count-btn" onclick="choosePlayerCount(1)">1</button>
                <button class="count-btn active" onclick="choosePlayerCount(2)">2</button>
                <button class="count-btn" onclick="choosePlayerCount(3)">3</button>
                <button class="count-btn" onclick="choosePlayerCount(4)">4</button>
            </div>
            <button class="btn" onclick="goToStep('step-rules')">Enter System</button>
        </div>

        <div id="step-rules" class="hidden flex flex-col items-center max-w-xl text-center">
            <div class="glass-panel">
                <h2 class="text-3xl font-black mb-8 text-white">任務簡報</h2>
                <div class="space-y-6 text-left">
                    <div class="flex items-center gap-4 group">
                        <div class="w-10 h-10 rounded-full bg-pink-500/20 flex items-center justify-center border border-pink-500/40 group-hover:bg-pink-500 transition-colors">⚔️</div>
                        <p class="text-slate-300"><b>制空權：</b> 從高處墜落踩踏目標頭部，即可解除威脅。</p>
                    </div>
                    <div class="flex items-center gap-4 group">
                        <div class="w-10 h-10 rounded-full bg-blue-500/20 flex items-center justify-center border border-blue-500/40 group-hover:bg-blue-500 transition-colors">💎</div>
                        <p class="text-slate-300"><b>核心升級：</b> 尋找閃爍的核心立方體，永久強化輸出能力。</p>
                    </div>
                    <div class="flex items-center gap-4 group">
                        <div class="w-10 h-10 rounded-full bg-yellow-500/20 flex items-center justify-center border border-yellow-500/40 group-hover:bg-yellow-500 transition-colors">🏁</div>
                        <p class="text-slate-300"><b>數據擷取：</b> 抵達區域末端的粉色傳送點以完成階段任務。</p>
                    </div>
                </div>
                <button class="btn mt-10 w-full" onclick="goToStep('step-hero')">Select Hero</button>
            </div>
        </div>

        <div id="step-hero" class="hidden flex flex-col items-center">
            <h2 id="hero-select-title" class="text-2xl font-black mb-10 text-blue-300 tracking-widest">P1 授權辨識中...</h2>
            <div class="grid grid-cols-2 gap-8 mb-12">
                <div class="hero-card selected" onclick="selectHero(0)">
                    <div class="w-14 h-14 bg-blue-400 mx-auto rounded-xl shadow-[0_0_20px_#60a5fa] mb-4"></div>
                    <p class="font-bold text-xs tracking-widest">小白 [平衡]</p>
                </div>
                <div class="hero-card" onclick="selectHero(1)">
                    <div class="w-14 h-14 bg-pink-400 mx-auto rounded-xl shadow-[0_0_20px_#f472b6] mb-4"></div>
                    <p class="font-bold text-xs tracking-widest">小紅 [敏捷]</p>
                </div>
                <div class="hero-card" onclick="selectHero(2)">
                    <div class="w-14 h-14 bg-green-400 mx-auto rounded-xl shadow-[0_0_20px_#4ade80] mb-4"></div>
                    <p class="font-bold text-xs tracking-widest">小翠 [高跳]</p>
                </div>
                <div class="hero-card" onclick="selectHero(3)">
                    <div class="w-14 h-14 bg-yellow-400 mx-auto rounded-xl shadow-[0_0_20px_#fbbf24] mb-4"></div>
                    <p class="font-bold text-xs tracking-widest">小金 [重裝]</p>
                </div>
            </div>
            <button class="btn px-16" onclick="confirmHero()">Initialize</button>
        </div>

        <div id="step-end" class="hidden flex flex-col items-center">
            <div class="glass-panel text-center">
                <h1 id="win-text" class="text-6xl font-black mb-6 text-yellow-400 italic"></h1>
                <p class="text-slate-400 mb-10 tracking-[0.2em]">MISSION COMPLETE - SYSTEM STABLE</p>
                <button class="btn" onclick="location.reload()">Return to Core</button>
            </div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 1000;
canvas.height = 600;

// --- 遊戲狀態變數 ---
let playerCount = 2; 
let currentPlayerSelecting = 1;
let selectedHeroIndices = [];
let gameRunning = false;
let winner = null;
let tempH = 0; 
let particles = []; 
let frameCount = 0;

const heroConfigs = [
    { name: '小白', color: '#60a5fa', jump: -12.5, speed: 0.9 },
    { name: '小紅', color: '#f472b6', jump: -11.5, speed: 1.3 },
    { name: '小翠', color: '#4ade80', jump: -16.0, speed: 0.8 },
    { name: '小金', color: '#fbbf24', jump: -11.0, speed: 1.1 }
];

const keys = {
    p1: { left: 'KeyA', right: 'KeyD', up: 'KeyW', active: {} },
    p2: { left: 'ArrowLeft', right: 'ArrowRight', up: 'ArrowUp', active: {} },
    p3: { left: 'KeyJ', right: 'KeyL', up: 'KeyI', active: {} },
    p4: { left: 'Numpad4', right: 'Numpad6', up: 'Numpad8', active: {} }
};

// --- 粒子特效系統 ---
class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;
        this.life = 1.0;
        this.color = color;
        this.size = Math.random() * 5 + 2;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.vy += 0.1; // 粒子重力
        this.life -= 0.02;
    }
    draw(ctx) {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 10; ctx.shadowColor = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1.0; ctx.shadowBlur = 0;
    }
}

function spawnExplosion(x, y, color, count = 15) {
    for (let i = 0; i < count; i++) {
        particles.push(new Particle(x, y, color));
    }
}

// --- 背景背景裝飾物 ---
const starField = Array.from({ length: 80 }, () => ({
    x: Math.random() * 2000,
    y: Math.random() * 600,
    s: Math.random() * 2 + 0.5,
    o: Math.random()
}));

const nebulaField = Array.from({ length: 5 }, () => ({
    x: Math.random() * 2000,
    y: Math.random() * 600,
    r: 150 + Math.random() * 100,
    c: `hsla(${250 + Math.random() * 50}, 70%, 50%, 0.05)`
}));

// --- 遊戲物件類別 ---
class Enemy {
    constructor(x, y, range = 120, speed = 2.5) {
        this.startX = x; this.x = x; this.y = y;
        this.w = 32; this.h = 32;
        this.range = range;
        this.vx = speed;
        this.active = true;
    }
    update() {
        if (!this.active) return;
        this.x += this.vx;
        if (this.x > this.startX + this.range || this.x < this.startX - this.range) this.vx *= -1;
    }
    draw(ctx, ox, oy, camX, sc) {
        if (!this.active) return;
        const dx = ox + (this.x - camX);
        const dy = oy + this.y * sc;
        
        ctx.save();
        ctx.fillStyle = '#ef4444';
        ctx.shadowBlur = 15; ctx.shadowColor = '#f87171';
        // 畫一個有層次感的方塊
        ctx.fillRect(dx, dy, this.w, this.h * sc);
        ctx.strokeStyle = 'white'; ctx.lineWidth = 1;
        ctx.strokeRect(dx + 2, dy + 2, this.w - 4, (this.h - 4) * sc);
        
        // 電子眼
        ctx.fillStyle = '#fff';
        const eyeX = this.vx > 0 ? dx + 22 : dx + 4;
        ctx.fillRect(eyeX, dy + 6, 6, 6);
        ctx.restore();
    }
}

class EasterEgg {
    constructor(x, y, type) {
        this.x = x; this.y = y; this.w = 40; this.h = 40;
        this.type = type; 
        this.active = true;
    }
    draw(ctx, ox, oy, camX, sc) {
        if (!this.active) return;
        const float = Math.sin(Date.now() / 250) * 12;
        const dx = ox + (this.x - camX);
        const dy = oy + (this.y + float) * sc;
        
        ctx.save();
        let color = this.type === 'speed' ? '#60a5fa' : (this.type === 'jump' ? '#4ade80' : '#fbbf24');
        ctx.shadowBlur = 20; ctx.shadowColor = color;
        ctx.translate(dx + 20, dy + 20);
        ctx.rotate(Date.now() / 800);
        ctx.fillStyle = color;
        ctx.fillRect(-18, -18, 36, 36);
        ctx.strokeStyle = 'white'; ctx.lineWidth = 3;
        ctx.strokeRect(-20, -20, 40, 40);
        
        ctx.fillStyle = 'white'; ctx.font = 'bold 22px Arial'; ctx.textAlign = 'center';
        ctx.rotate(-Date.now() / 800);
        let icon = this.type === 'speed' ? '⚡' : (this.type === 'jump' ? '↑' : '🛡️');
        ctx.fillText(icon, 0, 8);
        ctx.restore();
    }
}

class Player {
    constructor(id, hIdx) {
        this.id = id; this.config = { ...heroConfigs[hIdx] };
        this.w = 34; this.h = 34;
        this.reset();
    }
    reset() {
        this.x = 80; this.y = 150; this.vx = 0; this.vy = 0;
        this.levelIdx = 0; this.camX = 0; this.invinc = 0;
        this.jumpCount = 0; this.canJumpInput = true;
    }
    update(input, lvl, enemies, eggs) {
        if (this.invinc > 0) this.invinc--;
        if (input.left) this.vx -= this.config.speed;
        if (input.right) this.vx += this.config.speed;
        this.vx *= 0.88; this.vy += 0.68;
        this.x += this.vx; this.y += this.vy;

        if (input.up) {
            if (this.canJumpInput && this.jumpCount < 2) {
                this.vy = this.config.jump;
                this.jumpCount++;
                this.canJumpInput = false;
                spawnExplosion(this.x + 17, this.y + 34, 'rgba(255,255,255,0.4)', 5);
            }
        } else { this.canJumpInput = true; }

        // 碰撞檢測：平台
        lvl.platforms.forEach(p => {
            if (this.vy >= 0 && this.x+this.w > p.x && this.x < p.x+p.w && this.y+this.h >= p.y && this.y+this.h <= p.y+20) {
                this.y = p.y - this.h; this.vy = 0; this.jumpCount = 0;
            }
        });

        // 碰撞檢測：敵人 (踩踏判斷)
        enemies.forEach(e => {
            if (!e.active) return;
            if (this.x < e.x+e.w && this.x+this.w > e.x && this.y < e.y+e.h && this.y+this.h > e.y) {
                if (this.vy > 0 && this.y + this.h < e.y + 15) {
                    e.active = false; this.vy = -12; this.jumpCount = 1;
                    spawnExplosion(e.x + 16, e.y + 16, '#ef4444', 25);
                } else if (this.invinc <= 0) {
                    this.die();
                }
            }
        });

        // 碰撞檢測：彩蛋
        eggs.forEach(e => {
            if (e.active && this.x < e.x+e.w && this.x+this.w > e.x && this.y < e.y+e.h && this.y+this.h > e.y) {
                e.active = false;
                spawnExplosion(e.x+20, e.y+20, '#fff', 30);
                if (e.type === 'speed') this.config.speed += 0.4;
                if (e.type === 'jump') this.config.jump -= 3;
                if (e.type === 'shield') this.invinc = 900;
            }
        });

        if (this.y > 600) this.die();
        // 平滑相機跟隨
        this.camX += (Math.max(0, this.x - 350) - this.camX) * 0.1;
    }
    die() {
        spawnExplosion(this.x + 17, this.y + 17, this.config.color, 20);
        this.x = 80; this.y = 150; this.vx = 0; this.vy = 0; this.jumpCount = 0;
    }
    draw(ctx, ox, oy, camX, sc, isGhost = false) {
        const dx = ox + (this.x - camX);
        const dy = oy + this.y * sc;
        const breath = Math.sin(Date.now() / 200) * 2;
        
        ctx.save();
        if (isGhost) ctx.globalAlpha = 0.25;
        
        if (this.invinc > 0) {
            ctx.shadowBlur = 20; ctx.shadowColor = 'white';
            ctx.fillStyle = `hsl(${(Date.now()/5)%360}, 100%, 75%)`;
        } else {
            ctx.shadowBlur = 12; ctx.shadowColor = this.config.color;
            ctx.fillStyle = this.config.color;
        }
        
        // 角色本體
        ctx.fillRect(dx, dy + (isGhost?0:breath), this.w, (this.h - (isGhost?0:breath)) * sc);
        
        // 眼睛
        ctx.fillStyle = 'white';
        const lookDir = this.vx >= 0 ? 22 : 4;
        ctx.fillRect(dx + lookDir, dy + 8 + (isGhost?0:breath), 8, 8);
        
        ctx.restore();
    }
}

// --- UI 控制 ---
function choosePlayerCount(n) {
    playerCount = n;
    document.querySelectorAll('.count-btn').forEach((b, i) => b.classList.toggle('active', i === n - 1));
}

function goToStep(id) {
    document.querySelectorAll('#overlay > div').forEach(d => d.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

function selectHero(i) {
    tempH = i;
    document.querySelectorAll('.hero-card').forEach((c, idx) => c.classList.toggle('selected', idx === i));
}

function confirmHero() {
    selectedHeroIndices.push(tempH);
    if (currentPlayerSelecting < playerCount) {
        currentPlayerSelecting++;
        document.getElementById('hero-select-title').innerText = `P${currentPlayerSelecting} 授權辨識中...`;
        selectHero(0);
    } else { startGame(); }
}

// --- 遊戲循環與繪製 ---
let players = [], maps = [];

function startGame() {
    document.getElementById('overlay').style.display = 'none';
    players = selectedHeroIndices.map((idx, i) => new Player(i+1, idx));
    maps = [];
    
    for(let l=0; l<3; l++) {
        let plats = [{x: 0, y: 300, w: 500, h: 40}];
        let enemies = [], eggs = [];
        let mapLen = 5000 + (l * 1000);
        
        // 生成更複雜的地形
        for(let i=0; i<25; i++) {
            let px = 600 + i * 320;
            let py = 120 + Math.random() * 300;
            plats.push({ x: px, y: py, w: 180, h: 18 });
            if (i > 1) enemies.push(new Enemy(px + 30, py - 35, 60, 2.5 + l * 0.5));
            if (i % 6 === 5) {
                const types = ['speed', 'jump', 'shield'];
                eggs.push(new EasterEgg(px + 70, py - 90, types[l]));
            }
        }
        plats.push({x: mapLen - 500, y: 320, w: 500, h: 40});
        maps.push({ platforms: plats, enemies, eggs, finishX: mapLen - 200 });
    }
    gameRunning = true;
    requestAnimationFrame(loop);
}

function loop() {
    if(!gameRunning) return;
    frameCount++;
    
    // 更新所有粒子
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => p.update());

    players.forEach((p, i) => {
        let k = Object.values(keys)[i];
        let input = { left: k.active[k.left], right: k.active[k.right], up: k.active[k.up] };
        let m = maps[p.levelIdx];
        p.update(input, m, m.enemies, m.eggs);
        m.enemies.forEach(e => e.update());
        
        if (p.x > m.finishX) {
            if (p.levelIdx < 2) { p.levelIdx++; p.die(); }
            else { winner = p.id; gameRunning = false; showEnd(); }
        }
    });
    
    render();
    requestAnimationFrame(loop);
}

function render() {
    // 基礎背景色
    ctx.fillStyle = '#020617';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let rows = playerCount > 2 ? 2 : (playerCount > 1 ? 2 : 1);
    let cols = playerCount > 2 ? 2 : 1;
    let vw = canvas.width / cols, vh = canvas.height / rows;

    players.forEach((p, i) => {
        let r = Math.floor(i/cols), c = i%cols;
        let ox = c*vw, oy = r*vh;
        let sc = vh / 400; // 調整地圖比例

        ctx.save();
        ctx.beginPath(); ctx.rect(ox, oy, vw, vh); ctx.clip();
        
        // --- 繪製美化的背景 (Parallax) ---
        // 1. 遠景星雲
        nebulaField.forEach(n => {
            ctx.fillStyle = n.c;
            ctx.beginPath();
            ctx.arc(ox + (n.x - p.camX * 0.1) % 1500, oy + n.y, n.r, 0, Math.PI * 2);
            ctx.fill();
        });
        // 2. 遠景星星
        starField.forEach(s => {
            let flicker = Math.sin(frameCount * 0.05 + s.o * 10) * 0.5 + 0.5;
            ctx.fillStyle = `rgba(255, 255, 255, ${s.o * flicker})`;
            ctx.fillRect(ox + (s.x - p.camX * 0.3) % vw, oy + s.y, s.s, s.s);
        });
        
        let m = maps[p.levelIdx];
        
        // --- 繪製平台 ---
        m.platforms.forEach(plat => {
            let px = ox + (plat.x - p.camX), py = oy + plat.y * sc;
            // 平台發光底色
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(px, py, plat.w, plat.h * sc);
            // 霓虹上邊框
            ctx.strokeStyle = p.config.color; ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(px, py); ctx.lineTo(px + plat.w, py);
            ctx.stroke();
            // 平台裝飾細線
            ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
            ctx.strokeRect(px, py, plat.w, plat.h * sc);
        });

        // 終點光柱
        let finishGradient = ctx.createLinearGradient(ox + (m.finishX - p.camX), 0, ox + (m.finishX + 80 - p.camX), 0);
        finishGradient.addColorStop(0, 'rgba(236, 72, 153, 0.4)');
        finishGradient.addColorStop(1, 'transparent');
        ctx.fillStyle = finishGradient;
        ctx.fillRect(ox + (m.finishX - p.camX), oy, 150, vh);

        // 物件與敵人
        m.eggs.forEach(e => e.draw(ctx, ox, oy, p.camX, sc));
        m.enemies.forEach(e => e.draw(ctx, ox, oy, p.camX, sc));
        
        // 玩家 (與同關卡的影子)
        players.forEach(other => {
            if (other.levelIdx === p.levelIdx) {
                other.draw(ctx, ox, oy, p.camX, sc, other.id !== p.id);
            }
        });

        // 爆炸粒子
        particles.forEach(part => {
            // 粒子繪製時考慮視窗偏移
            const px = ox + (part.x - p.camX);
            const py = oy + part.y * sc;
            if (px > ox && px < ox + vw) part.draw(ctx);
        });

        // UI 指示
        ctx.fillStyle = 'white'; ctx.font = 'bold 12px "Courier New"';
        ctx.shadowBlur = 5; ctx.shadowColor = 'black';
        ctx.fillText(`P${p.id} STATUS: ONLINE | LEVEL ${p.levelIdx + 1}`, ox + 20, oy + vh - 20);
        ctx.shadowBlur = 0;
        
        ctx.restore();

        // 視窗分隔線
        ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 4;
        ctx.strokeRect(ox, oy, vw, vh);
    });
}

function showEnd() {
    document.getElementById('overlay').style.display = 'flex';
    goToStep('step-end');
    document.getElementById('win-text').innerText = `P${winner} DOMINATED`;
}

// --- 輸入監聽 ---
window.onload = () => { choosePlayerCount(2); };
window.addEventListener('keydown', e => {
    Object.values(keys).forEach(k => { if(k.left === e.code || k.right === e.code || k.up === e.code) k.active[e.code] = true; });
});
window.addEventListener('keyup', e => {
    Object.values(keys).forEach(k => { if(k.left === e.code || k.right === e.code || k.up === e.code) k.active[e.code] = false; });
});
</script>
