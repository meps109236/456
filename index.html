<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹戰紀：百子大對決</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #020617;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 100px rgba(139, 92, 246, 0.4);
            border: 4px solid #1e293b;
            border-radius: 24px;
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
        }
        .overlay-screen {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(15, 23, 42, 0.95), #020617);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
            padding: 20px;
            overflow-y: auto;
        }
        .btn {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            padding: 14px 48px;
            border-radius: 50px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            color: white;
            margin-top: 20px;
            box-shadow: 0 0 25px rgba(139, 92, 246, 0.5);
            text-align: center;
        }
        .btn:hover {
            transform: scale(1.05) translateY(-2px);
            filter: brightness(1.2);
        }
        .hero-card {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid #334155;
            border-radius: 20px;
            padding: 20px;
            width: 160px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .hero-card.selected {
            border-color: #ec4899;
            background: rgba(236, 72, 153, 0.1);
        }
        .count-btn {
            width: 80px;
            height: 64px;
            border: 2px solid #334155;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            transition: all 0.2s;
        }
        .count-btn.active {
            border-color: #ec4899;
            background-color: rgba(236, 72, 153, 0.2);
            color: white;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="overlay" class="overlay-screen">
        <div id="step-count" class="flex flex-col items-center">
            <h1 class="text-4xl font-bold mb-8 text-pink-400">霓虹戰紀：百子大對決</h1>
            <p class="text-slate-400 mb-4">現在你可以「踩掉」敵人的頭來消滅他們！</p>
            <div class="flex gap-4 mb-10">
                <button class="count-btn" onclick="choosePlayerCount(1)">1人</button>
                <button class="count-btn active" onclick="choosePlayerCount(2)">2人</button>
                <button class="count-btn" onclick="choosePlayerCount(3)">3人</button>
                <button class="count-btn" onclick="choosePlayerCount(4)">4人</button>
            </div>
            <button class="btn" onclick="goToStep('step-rules')">下一步</button>
        </div>

        <div id="step-rules" class="hidden flex flex-col items-center max-w-xl">
            <h2 class="text-2xl font-bold mb-4 text-violet-400">戰鬥技巧</h2>
            <div class="bg-white/5 p-6 rounded-2xl border border-white/10 w-full mb-6 space-y-4">
                <p>⚔️ <b>消滅敵人：</b> 從上方踩踏紅色機器人的頭部可以將其摧毀。</p>
                <p>✨ <b>隱藏彩蛋：</b> 每一關的角落都藏著特殊方塊！</p>
                <p>💠 <b>Lv1 加速：</b> 永久提升跑速。</p>
                <p>🔼 <b>Lv2 高跳：</b> 強化你的二連跳高度。</p>
                <p>🛡️ <b>Lv3 神盾：</b> 長時間無敵保護。</p>
                <hr class="opacity-20">
                <p class="text-sm">操作：P1(WASD), P2(方向鍵), P3(IJKL), P4(小鍵盤8456)</p>
            </div>
            <button class="btn" onclick="goToStep('step-hero')">進入選角</button>
        </div>

        <div id="step-hero" class="hidden flex flex-col items-center">
            <h2 id="hero-select-title" class="text-2xl font-bold mb-6">1P 選擇角色</h2>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="hero-card selected" onclick="selectHero(0)"><div class="w-10 h-10 bg-blue-400 mx-auto rounded"></div><p class="mt-2">小白 (平衡)</p></div>
                <div class="hero-card" onclick="selectHero(1)"><div class="w-10 h-10 bg-pink-400 mx-auto rounded"></div><p class="mt-2">小紅 (速度)</p></div>
                <div class="hero-card" onclick="selectHero(2)"><div class="w-10 h-10 bg-green-400 mx-auto rounded"></div><p class="mt-2">小翠 (高跳)</p></div>
                <div class="hero-card" onclick="selectHero(3)"><div class="w-10 h-10 bg-yellow-400 mx-auto rounded"></div><p class="mt-2">小金 (穩定)</p></div>
            </div>
            <button class="btn" onclick="confirmHero()">確認選角</button>
        </div>

        <div id="step-end" class="hidden flex flex-col items-center">
            <h1 id="win-text" class="text-5xl font-bold mb-10 text-center text-yellow-400"></h1>
            <button class="btn" onclick="location.reload()">再玩一次</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 1000;
canvas.height = 600;

let playerCount = 2; 
let currentPlayerSelecting = 1;
let selectedHeroIndices = [];
let gameRunning = false;
let winner = null;
let tempH = 0; 

const heroConfigs = [
    { name: '小白', color: '#60a5fa', jump: -12, speed: 0.8 },
    { name: '小紅', color: '#f472b6', jump: -11, speed: 1.2 },
    { name: '小翠', color: '#4ade80', jump: -15, speed: 0.7 },
    { name: '小金', color: '#fbbf24', jump: -10, speed: 1.0 }
];

const keys = {
    p1: { left: 'KeyA', right: 'KeyD', up: 'KeyW', active: {} },
    p2: { left: 'ArrowLeft', right: 'ArrowRight', up: 'ArrowUp', active: {} },
    p3: { left: 'KeyJ', right: 'KeyL', up: 'KeyI', active: {} },
    p4: { left: 'Numpad4', right: 'Numpad6', up: 'Numpad8', active: {} }
};

class Enemy {
    constructor(x, y, range = 100, speed = 2) {
        this.startX = x; this.x = x; this.y = y;
        this.w = 30; this.h = 30;
        this.range = range;
        this.vx = speed;
        this.color = '#ff4444';
        this.active = true;
    }
    update() {
        if (!this.active) return;
        this.x += this.vx;
        if (this.x > this.startX + this.range || this.x < this.startX - this.range) this.vx *= -1;
    }
    draw(ctx, ox, oy, camX, sc) {
        if (!this.active) return;
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 10; ctx.shadowColor = 'red';
        ctx.fillRect(ox + (this.x - camX), oy + this.y * sc, this.w, this.h * sc);
        ctx.fillStyle = 'white';
        ctx.fillRect(ox + (this.x - camX) + (this.vx > 0 ? 18:5), oy + this.y * sc + 8, 8, 8);
        ctx.shadowBlur = 0;
    }
}

class EasterEgg {
    constructor(x, y, type) {
        this.x = x; this.y = y; this.w = 40; this.h = 40;
        this.type = type; // 'speed', 'jump', 'shield'
        this.active = true;
        this.floatY = 0;
    }
    update() {
        this.floatY = Math.sin(Date.now() / 200) * 10;
    }
    draw(ctx, ox, oy, camX, sc) {
        if (!this.active) return;
        ctx.save();
        ctx.shadowBlur = 20;
        ctx.shadowColor = this.type === 'speed' ? '#60a5fa' : (this.type === 'jump' ? '#4ade80' : '#fbbf24');
        ctx.fillStyle = ctx.shadowColor;
        const dx = ox + (this.x - camX);
        const dy = oy + (this.y + this.floatY) * sc;
        ctx.fillRect(dx, dy, this.w, this.h * sc);
        
        ctx.fillStyle = 'white';
        ctx.font = 'bold 20px Arial';
        ctx.textAlign = 'center';
        let icon = this.type === 'speed' ? '⚡' : (this.type === 'jump' ? '↑' : '🛡️');
        ctx.fillText(icon, dx + this.w/2, dy + this.h/2 + 7);
        ctx.restore();
    }
}

class PowerStar {
    constructor(x, y) {
        this.x = x; this.y = y; this.w = 30; this.h = 30;
        this.vx = 2; this.active = true;
    }
    update(plats) {
        if(!this.active) return;
        this.x += this.vx;
        let onPlat = false;
        plats.forEach(p => {
            if (this.x + this.w > p.x && this.x < p.x + p.w && this.y + this.h >= p.y && this.y + this.h <= p.y + 10) onPlat = true;
        });
        if (!onPlat) this.vx *= -1;
    }
    draw(ctx, ox, oy, camX, sc) {
        if(!this.active) return;
        ctx.fillStyle = '#fbbf24';
        ctx.shadowBlur = 15; ctx.shadowColor = 'yellow';
        ctx.beginPath();
        let cx = ox + (this.x - camX) + 15, cy = oy + this.y * sc + 15;
        for(let i=0; i<5; i++) {
            ctx.lineTo(cx + Math.cos(i*1.25 - 0.3)*15, cy + Math.sin(i*1.25 - 0.3)*15);
            ctx.lineTo(cx + Math.cos(i*1.25 + 0.3)*7, cy + Math.sin(i*1.25 + 0.3)*7);
        }
        ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0;
    }
}

class Player {
    constructor(id, hIdx) {
        this.id = id; this.config = { ...heroConfigs[hIdx] };
        this.w = 36; this.h = 36;
        this.jumpCount = 0;
        this.canJumpInput = true;
        this.reset();
    }
    reset() {
        this.x = 50; this.y = 150; this.vx = 0; this.vy = 0;
        this.levelIdx = 0; this.camX = 0; this.invinc = 0;
        this.grounded = false;
        this.jumpCount = 0;
    }
    update(input, lvl, stars, enemies, eggs) {
        if (this.invinc > 0) this.invinc--;
        if (input.left) this.vx -= this.config.speed;
        if (input.right) this.vx += this.config.speed;
        this.vx *= 0.85; this.vy += 0.6;
        this.x += this.vx; this.y += this.vy;

        if (input.up) {
            if (this.canJumpInput && this.jumpCount < 2) {
                this.vy = this.config.jump;
                this.jumpCount++;
                this.grounded = false;
                this.canJumpInput = false;
            }
        } else {
            this.canJumpInput = true;
        }

        this.grounded = false;
        lvl.platforms.forEach(p => {
            if (this.vy >= 0 && this.x+this.w > p.x && this.x < p.x+p.w && this.y+this.h >= p.y && this.y+this.h <= p.y+15) {
                this.y = p.y - this.h; this.vy = 0; 
                this.grounded = true;
                this.jumpCount = 0;
            }
        });

        stars.forEach(s => {
            if (s.active && this.x < s.x+s.w && this.x+this.w > s.x && this.y < s.y+s.h && this.y+this.h > s.y) {
                s.active = false; this.invinc = 300;
            }
        });

        eggs.forEach(e => {
            if (e.active && this.x < e.x+e.w && this.x+this.w > e.x && this.y < e.y+e.h && this.y+this.h > e.y) {
                e.active = false;
                if (e.type === 'speed') this.config.speed += 0.3;
                if (e.type === 'jump') this.config.jump -= 2.5;
                if (e.type === 'shield') this.invinc = 1000;
            }
        });
        
        // 敵人碰撞偵測 (包含踩踏)
        enemies.forEach(e => {
            if (!e.active) return;
            if (this.x < e.x+e.w && this.x+this.w > e.x && this.y < e.y+e.h && this.y+this.h > e.y) {
                // 判斷是否為「踩」：玩家正在下墜，且腳底位置高於敵人中心
                if (this.vy > 0 && this.y + this.h < e.y + e.h / 2 + 10) {
                    e.active = false; // 敵人死亡
                    this.vy = -8;     // 踩踏後的彈跳
                    this.jumpCount = 1; // 重置為一段跳狀態，讓玩家還能再跳一次
                } else if (this.invinc <= 0) {
                    this.die();
                }
            }
        });

        if (this.y > 600) this.die();
        this.camX += (Math.max(0, this.x - 300) - this.camX) * 0.1;
    }
    die() { this.x = 50; this.y = 150; this.vx = 0; this.vy = 0; this.jumpCount = 0; }
    
    draw(ctx, ox, oy, camX, sc, isGhost = false) {
        const dx = ox + (this.x - camX);
        const dy = oy + this.y * sc;
        
        ctx.save();
        if (isGhost) {
            ctx.globalAlpha = 0.5;
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.strokeRect(dx, dy, this.w, this.h * sc);
        }
        
        if (this.invinc > 0) {
            ctx.shadowBlur = 15; ctx.shadowColor = 'white';
            ctx.fillStyle = `hsl(${Date.now()%360}, 100%, 75%)`;
        } else {
            ctx.fillStyle = this.config.color;
        }
        
        ctx.fillRect(dx, dy, this.w, this.h * sc);
        
        // 眼睛
        ctx.fillStyle = 'white';
        ctx.fillRect(dx + (this.vx >= 0 ? 22:6), dy + 8, 8, 8 * sc);
        ctx.restore();
    }
}

function choosePlayerCount(n) {
    playerCount = n;
    const buttons = document.querySelectorAll('#step-count .count-btn');
    buttons.forEach((btn, index) => {
        if (index === n - 1) btn.classList.add('active');
        else btn.classList.remove('active');
    });
}

function goToStep(id) {
    document.querySelectorAll('#overlay > div').forEach(d => d.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

function selectHero(i) {
    tempH = i;
    document.querySelectorAll('.hero-card').forEach((c, idx) => c.classList.toggle('selected', idx === i));
}

function confirmHero() {
    selectedHeroIndices.push(tempH);
    if (currentPlayerSelecting < playerCount) {
        currentPlayerSelecting++;
        document.getElementById('hero-select-title').innerText = `${currentPlayerSelecting}P 選擇角色`;
        selectHero(0);
    } else { 
        startGame(); 
    }
}

let players = [], maps = [];
function startGame() {
    document.getElementById('overlay').style.display = 'none';
    players = selectedHeroIndices.map((idx, i) => new Player(i+1, idx));
    maps = [];
    
    for(let l=0; l<3; l++) {
        let plats = [{x: 0, y: 250, w: 450, h: 40}];
        let enemies = [], stars = [], eggs = [];
        let mapLen = 4000;
        
        if (l === 0) {
            eggs.push(new EasterEgg(200, 50, 'speed')); 
            for(let i=0; i<12; i++) {
                let px = 600 + i*300, py = 150 + Math.random()*100;
                plats.push({x: px, y: py, w: 250, h: 20});
                if(i > 2) enemies.push(new Enemy(px + 50, py - 35, 80, 1.5));
            }
        } else if (l === 1) {
            eggs.push(new EasterEgg(1500, 30, 'jump')); 
            for(let i=0; i<15; i++) {
                let px = 500 + i*260, py = 100 + Math.random()*150;
                plats.push({x: px, y: py, w: 140, h: 20});
                enemies.push(new Enemy(px + 20, py - 35, 60, 2.5));
                if(i % 4 === 0) stars.push(new PowerStar(px + 50, py - 50));
            }
        } else {
            eggs.push(new EasterEgg(3000, 150, 'shield')); 
            for(let i=0; i<30; i++) {
                let px = 500 + i*140, py = 120 + (i%3)*60;
                plats.push({x: px, y: py, w: 110, h: 20});
                enemies.push(new Enemy(px + 10, py - 35, 40, 3));
                if(i % 2 === 0) enemies.push(new Enemy(px + 50, py - 35, 40, 4));
            }
        }
        
        plats.push({x: mapLen - 450, y: 250, w: 450, h: 40});
        maps.push({ platforms: plats, enemies, stars, eggs, finishX: mapLen - 250 });
    }
    gameRunning = true;
    requestAnimationFrame(update);
}

function update() {
    if(!gameRunning) return;
    players.forEach((p, i) => {
        let k = Object.values(keys)[i];
        let input = { left: k.active[k.left], right: k.active[k.right], up: k.active[k.up] };
        let m = maps[p.levelIdx];
        p.update(input, m, m.stars, m.enemies, m.eggs);
        m.stars.forEach(s => s.update(m.platforms));
        m.enemies.forEach(e => e.update());
        m.eggs.forEach(e => e.update());
        if (p.x > m.finishX) {
            if (p.levelIdx < 2) { p.levelIdx++; p.die(); }
            else { winner = p.id; endGame(); }
        }
    });
    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let rows = playerCount > 2 ? 2 : playerCount;
    let cols = playerCount > 2 ? 2 : 1;
    if (playerCount === 1) { rows = 1; cols = 1; }
    
    let vw = canvas.width / cols, vh = canvas.height / rows;
    
    players.forEach((p, i) => {
        let r = Math.floor(i/cols), c = i%cols;
        let ox = c*vw, oy = r*vh;
        ctx.save();
        ctx.beginPath(); ctx.rect(ox, oy, vw, vh); ctx.clip();
        
        ctx.fillStyle = '#020617'; ctx.fillRect(ox, oy, vw, vh);
        
        let m = maps[p.levelIdx];
        let sc = vh / 300;
        
        ctx.fillStyle = '#1e293b'; ctx.strokeStyle = p.config.color;
        m.platforms.forEach(plat => {
            let px = ox + (plat.x - p.camX), py = oy + plat.y * sc;
            ctx.fillRect(px, py, plat.w, plat.h * sc);
            ctx.lineWidth = 2;
            ctx.strokeRect(px, py, plat.w, plat.h * sc);
        });

        ctx.fillStyle = 'rgba(236, 72, 153, 0.4)';
        ctx.fillRect(ox + (m.finishX - p.camX), oy, 20, vh);

        m.eggs.forEach(e => e.draw(ctx, ox, oy, p.camX, sc));

        players.forEach(other => {
            if (other.levelIdx === p.levelIdx) {
                other.draw(ctx, ox, oy, p.camX, sc, other.id !== p.id);
            }
        });

        m.stars.forEach(s => s.draw(ctx, ox, oy, p.camX, sc));
        m.enemies.forEach(e => e.draw(ctx, ox, oy, p.camX, sc));
        
        ctx.fillStyle = 'white'; ctx.font = 'bold 18px Arial';
        ctx.shadowBlur = 4; ctx.shadowColor = 'black';
        ctx.fillText(`P${p.id} ${p.config.name} | 關卡 ${p.levelIdx+1}/3`, ox+20, oy+35);
        ctx.shadowBlur = 0;
        
        ctx.restore();
        ctx.strokeStyle = '#334155'; ctx.lineWidth = 4;
        ctx.strokeRect(ox, oy, vw, vh);
    });
}

function endGame() {
    gameRunning = false;
    document.getElementById('overlay').style.display = 'flex';
    goToStep('step-end');
    document.getElementById('win-text').innerText = `🏆 恭喜 玩家 ${winner} 率先通關！`;
}

window.onload = () => { choosePlayerCount(2); };
window.addEventListener('keydown', e => {
    Object.values(keys).forEach(k => { if(k.left === e.code || k.right === e.code || k.up === e.code) k.active[e.code] = true; });
});
window.addEventListener('keyup', e => {
    Object.values(keys).forEach(k => { if(k.left === e.code || k.right === e.code || k.up === e.code) k.active[e.code] = false; });
});
</script>
</body>
</html>
